name: DSRemote
options:
  bundleIdPrefix: com.dsremote
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.2'

settings:
  base:
    SWIFT_VERSION: '5.9'
    TARGETED_DEVICE_FAMILY: '1'

targets:
  DSRemote:
    type: application
    platform: iOS
    sources:
      - path: DSRemoteApp.swift
      - path: Models
      - path: Services
      - path: Views
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarStyle: UIStatusBarStyleDarkContent
        CFBundleDisplayName: DSRemote
        CFBundleVersion: '1'
        CFBundleShortVersionString: '1.0'
        UILaunchScreen: {}
